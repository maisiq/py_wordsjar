name: Deploy WordsJar Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    branches: [ "master" ]
    paths-ignore:
      - '**/README.md'
      - 'docs/**'
      - '.gitignore'

env:
  WORK_DIR: ${{ vars.WORK_DIR }}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: copy ssh private key to file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIV_KEY }}" > ~/key.pem
          chmod 600 ~/key.pem

      - name: Add remote host to known_hosts
        run: |
          ssh-keyscan -H -p ${{ vars.SSH_PORT }} ${{ vars.SSH_ADDR }} >> ~/.ssh/known_hosts

      - name: Determine branch to checkout
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "BRANCH=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Update code on server
        run: |
          BRANCH="${{ steps.branch.outputs.BRANCH }}"
          ssh -i ~/key.pem -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT }} ${{ vars.SSH_USER }}@${{ vars.SSH_ADDR }} "
            set -e
            cd ${{ env.WORK_DIR }}
            git init
            git remote add origin https://github.com/${{ github.repository }}.git 2>/dev/null || true
            git fetch origin $BRANCH
            git checkout $BRANCH
            git sparse-checkout init --cone
            git sparse-checkout set backend
          "

      - name: Setup Python and install dependencies with uv
        run: |
          ssh -i ~/key.pem -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT }} ${{ vars.SSH_USER }}@${{ vars.SSH_ADDR }} "
            set -e
            cd ${{ env.WORK_DIR }}

            # Check .python-version
            if [ ! -f .python-version ]; then
              echo 'No .python-version file, skipping'
              exit 0
            fi

            PYTHON_VERSION=\$(cat .python-version)

            case \$PYTHON_VERSION in
              3.11) PYTHON_BIN=/opt/python3.11/bin/python3 ;;
              3.12) PYTHON_BIN=/opt/python3.12/bin/python3 ;;
              *)
                echo \"Unsupported Python version: \$PYTHON_VERSION\"
                exit 1
                ;;
            esac

            # Detect previously used Python version in .venv (if exists)
            PREV_PYTHON=\"\"
            if [ -f .venv/bin/python ]; then
              PREV_PYTHON=\$(readlink -f .venv/bin/python)
            fi

            # If Python version changed or .venv missing: recreate venv
            if [ ! -d .venv ] || [ \"\$PREV_PYTHON\" != \"\$PYTHON_BIN\" ]; then
              echo 'Creating fresh virtual environment...'
              rm -rf .venv
              uv venv --python \$PYTHON_BIN
            fi

            # Sync dependencies from pyproject.toml (in backend/)
            cd backend
            uv sync
          "

      - name: Restart systemd service
        run: |
          ssh -i ~/key.pem -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT }} ${{ vars.SSH_USER }}@${{ vars.SSH_ADDR }} "systemctl restart ${{ vars.SYSTEMD_SERVICE_NAME }}"
